services:
  backend:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mongo

  mongo:
    image: mongodb/mongodb-community-server:latest
    restart: unless-stopped
    volumes:
      - mongodata:/data/db
    env_file:
      - .env

volumes:
  mongodata:
